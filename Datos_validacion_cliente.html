<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validación de datos del cliente</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --red: #E31E24;
    --red-light: #fff8f8;
    --navy: #243746;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --blue-dark: #0C447C;
    --gray: #6b7785;
    --gray-light: #f7f9fb;
    --border: #e5eaf0;
    --success: #3B6D11;
    --success-light: #EAF3DE;
    --danger-light: #FCEBEB;
    --danger: #A32D2D;
    --bg: #f4f6f8;
    --font: Arial, Helvetica, sans-serif;
    --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--navy); min-height: 100vh; }

  /* ── TOP BAR ── */
  .topbar {
    background: var(--navy);
    color: #fff;
    padding: 0 24px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .topbar-title { font-size: 14px; font-weight: bold; letter-spacing: 0.3px; }
  .topbar-sub { font-size: 12px; opacity: 0.6; }
  .topbar-right { display: flex; gap: 8px; }

  /* ── BUTTONS ── */
  .btn {
    padding: 7px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    font-family: var(--font);
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--red); color: #fff; }
  .btn-secondary { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.25); }
  .btn-outline { background: #fff; color: var(--navy); border: 1px solid var(--border); }
  .btn-pdf { background: #27500A; color: #fff; }

  /* ── LAYOUT ── */
  .page { max-width: 980px; margin: 0 auto; padding: 24px 16px 60px; }

  /* ── CONFIG PANEL ── */
  .config-panel {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .config-header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    background: var(--gray-light);
    border-bottom: 1px solid var(--border);
  }
  .config-header span { font-size: 13px; font-weight: bold; color: var(--gray); }
  .config-body { display: none; padding: 16px; }
  .config-body.open { display: block; }
  .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field-group { display: flex; flex-direction: column; gap: 4px; }
  .field-group label { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.04em; color: var(--gray); }
  .field-group input { padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; font-family: var(--font); color: var(--navy); outline: none; }
  .field-group input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(24,95,165,0.1); }

  /* ── SEARCH BAR ── */
  .search-bar {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .search-bar .field-group { flex: 1; }
  .search-bar input { font-size: 16px; padding: 10px 14px; }

  /* ── STATUS ── */
  .status { display: none; align-items: center; gap: 8px; padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-top: 12px; }
  .status.loading { display: flex; background: var(--blue-light); color: var(--blue-dark); }
  .status.error   { display: flex; background: var(--danger-light); color: var(--danger); }
  .status.success { display: flex; background: var(--success-light); color: var(--success); }
  .spinner { width: 14px; height: 14px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── CLIENT HEADER ── */
  .client-header {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-left: 4px solid var(--red);
  }
  .client-header-left { display: flex; align-items: center; gap: 14px; }
  .avatar { width: 46px; height: 46px; border-radius: 50%; background: var(--blue-light); color: var(--blue-dark); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 15px; flex-shrink: 0; }
  .client-name { font-size: 17px; font-weight: bold; color: var(--navy); }
  .client-meta { font-size: 12px; color: var(--gray); margin-top: 3px; }
  .changes-badge { display: none; background: var(--red); color: #fff; font-size: 12px; font-weight: bold; padding: 4px 12px; border-radius: 20px; }
  .changes-badge.visible { display: inline-block; }

  /* ── SECTION ── */
  .section {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .section-header {
    padding: 10px 16px;
    font-size: 13px;
    font-weight: bold;
    color: #fff;
    letter-spacing: 0.4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-header.readonly { background: #4a6278; }
  .section-header.editable { background: var(--red); }
  .section-note {
    padding: 7px 16px;
    font-size: 11px;
    color: var(--red);
    background: var(--red-light);
    border-bottom: 1px solid #ffd6d6;
    font-weight: bold;
  }

  /* ── FIELD TABLE ── */
  .field-table { width: 100%; border-collapse: collapse; }
  .field-table th {
    padding: 8px 12px;
    font-size: 10px;
    font-weight: bold;
    text-transform: uppercase;
    color: var(--gray);
    background: #f0f3f6;
    border: 1px solid var(--border);
    text-align: left;
  }
  .field-table th.correction { color: var(--red); background: var(--red-light); }
  .field-table td {
    padding: 9px 12px;
    border: 1px solid var(--border);
    font-size: 13px;
    vertical-align: middle;
  }
  .field-table tr:nth-child(even) td { background: #fafbfc; }
  .field-label-cell { width: 28%; color: var(--gray); font-size: 12px; }
  .field-value-cell { width: 36%; color: var(--navy); }
  .field-input-cell { width: 36%; background: #fffbf5; }
  .field-input-cell.changed { background: #fff8f8; }

  .correction-input {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 13px;
    font-family: var(--font);
    color: var(--navy);
    background: transparent;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .correction-input:focus { border-color: var(--red); background: #fff; box-shadow: 0 0 0 2px rgba(227,30,36,0.1); }
  .correction-input.has-value { border-color: var(--red); background: var(--red-light); font-weight: bold; color: var(--red); }

  /* ── READONLY GRID ── */
  .readonly-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 0;
  }
  .readonly-cell {
    padding: 10px 14px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .readonly-cell:last-child { border-right: none; }
  .readonly-label { font-size: 10px; color: var(--gray); font-weight: bold; text-transform: uppercase; margin-bottom: 3px; }
  .readonly-value { font-size: 13px; color: var(--navy); }

  /* ── SUMMARY ── */
  .summary-panel {
    display: none;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .summary-panel.visible { display: block; }
  .summary-header { padding: 10px 16px; background: #27500A; color: #fff; font-size: 13px; font-weight: bold; }
  .summary-table { width: 100%; border-collapse: collapse; }
  .summary-table td { padding: 8px 12px; border: 1px solid var(--border); font-size: 13px; }
  .summary-table .lbl { color: var(--gray); font-size: 11px; width: 28%; }
  .summary-table .old { color: var(--gray); text-decoration: line-through; width: 30%; }
  .summary-table .new { color: var(--red); font-weight: bold; width: 30%; }
  .summary-table .sec { color: var(--blue); font-size: 11px; width: 12%; }

  /* ── RESULT CONTAINER ── */
  #resultado { display: none; }
  #resultado.visible { display: block; }

  /* ── PDF PRINT AREA ── */


  /* ── OBSERVATIONS ── */
  .obs-area {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }
  .obs-area label { font-size: 12px; font-weight: bold; color: var(--gray); text-transform: uppercase; display: block; margin-bottom: 6px; }
  .obs-area textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    font-family: var(--font);
    resize: vertical;
    min-height: 80px;
    outline: none;
    color: var(--navy);
  }
  .obs-area textarea:focus { border-color: var(--blue); }

  /* ── ACTION BAR ── */
  .action-bar {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    padding: 16px 0;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div>
      <div class="topbar-title">Validación de datos del cliente</div>
      <div class="topbar-sub" id="topbar-cliente">Ingrese un CIF para comenzar</div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn btn-secondary" onclick="toggleConfig()">⚙ Configuración</button>
    <button class="btn btn-pdf" id="btn-pdf" onclick="exportarPDF()" disabled>⬇ Exportar PDF</button>
  </div>
</div>

<div class="page">

  <!-- CONFIG -->
  <div class="config-panel" id="configPanel">
    <div class="config-header" onclick="toggleConfig()">
      <span>Configuración del endpoint</span>
      <span id="configToggleLabel" style="font-size:12px;color:var(--blue);">Abrir ▼</span>
    </div>
    <div class="config-body" id="configBody">
      <div class="config-grid">
        <div class="field-group" style="grid-column:1/-1">
          <label>URL del HTTP trigger (Power Automate)</label>
          <input type="url" id="endpointUrl" placeholder="https://prod-xx.westus.logic.azure.com/workflows/...">
        </div>
        <div class="field-group">
          <label>Nombre del campo CIF en el body</label>
          <input type="text" id="paramName" value="cif">
        </div>
        <div class="field-group">
          <label>Campo JSON de validación en la respuesta</label>
          <input type="text" id="jsonField" value="json_validacion">
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn btn-outline" onclick="saveConfig()">Guardar configuración</button>
        <button class="btn btn-outline" onclick="testEndpoint()">Probar conexión</button>
      </div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-bar">
    <div class="field-group" style="flex:1">
      <label>CIF del cliente</label>
      <input type="text" id="cifInput" placeholder="Ingrese el CIF..."
        onkeydown="if(event.key==='Enter') buscar()">
    </div>
    <button class="btn btn-primary" id="btnBuscar" onclick="buscar()">Consultar</button>
  </div>
  <div class="status" id="statusBar">
    <div class="spinner" id="spinner" style="display:none"></div>
    <span id="statusMsg"></span>
  </div>

  <!-- RESULTADO -->
  <div id="resultado">

    <!-- CLIENT HEADER -->
    <div class="client-header">
      <div class="client-header-left">
        <div class="avatar" id="avatarEl">--</div>
        <div>
          <div class="client-name" id="clienteNombre">—</div>
          <div class="client-meta" id="clienteMeta">—</div>
        </div>
      </div>
      <span class="changes-badge" id="changesBadge">0 cambios</span>
    </div>

    <!-- SECCIONES DINAMICAS -->
    <div id="seccionesContainer"></div>

    <!-- OBSERVACIONES -->
    <div class="obs-area">
      <label>Observaciones del oficial</label>
      <textarea id="observaciones" placeholder="Ingrese observaciones adicionales sobre la gestión..."></textarea>
    </div>

    <!-- RESUMEN DE CAMBIOS -->
    <div class="summary-panel" id="summaryPanel">
      <div class="summary-header">Resumen de correcciones capturadas</div>
      <table class="summary-table" id="summaryTable"></table>
    </div>

    <!-- ACCIONES -->
    <div class="action-bar">
      <button class="btn btn-outline" onclick="limpiarCambios()">Limpiar cambios</button>
      <button class="btn btn-pdf" onclick="exportarPDF()">⬇ Exportar PDF con correcciones</button>
    </div>

  </div>
</div>



<script>
const CONFIG_KEY = 'validacion_config_v2';
let datosCliente = null;
let cambios = {};

const SECCIONES = {
  datos_cliente:     { label: 'Datos del cliente',     editable: false },
  contacto:          { label: 'Datos de contacto',     editable: true  },
  perfil_financiero: { label: 'Perfil financiero',     editable: true  },
  datos_laborales:   { label: 'Datos laborales',       editable: true  },
  direccion:         { label: 'Dirección de residencia', editable: true }
};

function loadConfig() {
  try {
    const c = JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}');
    if (c.url)   document.getElementById('endpointUrl').value = c.url;
    if (c.param) document.getElementById('paramName').value   = c.param;
    if (c.field) document.getElementById('jsonField').value   = c.field;
  } catch(e) {}
}

function saveConfig() {
  localStorage.setItem(CONFIG_KEY, JSON.stringify({
    url:   document.getElementById('endpointUrl').value.trim(),
    param: document.getElementById('paramName').value.trim() || 'cif',
    field: document.getElementById('jsonField').value.trim()  || 'json_validacion'
  }));
  showStatus('success', 'Configuración guardada');
  cerrarConfig();
}

function toggleConfig() {
  const body  = document.getElementById('configBody');
  const label = document.getElementById('configToggleLabel');
  const open  = body.classList.toggle('open');
  label.textContent = open ? 'Cerrar ▲' : 'Abrir ▼';
}

function cerrarConfig() {
  document.getElementById('configBody').classList.remove('open');
  document.getElementById('configToggleLabel').textContent = 'Abrir ▼';
}

function showStatus(type, msg, spin) {
  const bar = document.getElementById('statusBar');
  bar.className = 'status ' + type;
  document.getElementById('statusMsg').textContent = msg;
  document.getElementById('spinner').style.display = spin ? 'block' : 'none';
}

function hideStatus() { document.getElementById('statusBar').className = 'status'; }

function getInitials(name) {
  return (name || '??').trim().split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
}

async function buscar() {
  const cif   = document.getElementById('cifInput').value.trim();
  const url   = document.getElementById('endpointUrl').value.trim();
  const param = document.getElementById('paramName').value.trim()  || 'cif';
  const field = document.getElementById('jsonField').value.trim()   || 'json_validacion';

  if (!cif) { showStatus('error', 'Ingrese un CIF'); return; }
  if (!url) {
    showStatus('error', 'Configure la URL del endpoint primero');
    document.getElementById('configBody').classList.add('open');
    document.getElementById('configToggleLabel').textContent = 'Cerrar ▲';
    return;
  }

  document.getElementById('resultado').classList.remove('visible');
  document.getElementById('btn-pdf').disabled = true;
  showStatus('loading', 'Consultando...', true);
  document.getElementById('btnBuscar').disabled = true;

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ [param]: cif })
    });

    if (res.status === 404) { showStatus('error', `No se encontró cliente con CIF: ${cif}`); return; }
    if (!res.ok)            { showStatus('error', `Error ${res.status}: ${res.statusText}`); return; }

    const raw = await res.json();

    let jsonStr = raw[field] || raw['json_validacion'] || null;
    if (!jsonStr) { showStatus('error', `El campo "${field}" no está en la respuesta del flow`); return; }

    let datos;
    try {
      datos = typeof jsonStr === 'string' ? JSON.parse(jsonStr) : jsonStr;
    } catch(e) {
      showStatus('error', 'El JSON de validación está malformado: ' + e.message); return;
    }

    datosCliente = datos;
    cambios = {};
    renderizarCliente(datos);
    showStatus('success', 'Cliente cargado correctamente');
    document.getElementById('btn-pdf').disabled = false;

  } catch(e) {
    showStatus('error', e.name === 'TypeError'
      ? 'No se pudo conectar — verifica la URL o el header CORS del flow (Access-Control-Allow-Origin: *)'
      : 'Error: ' + e.message);
  } finally {
    document.getElementById('btnBuscar').disabled = false;
  }
}

function renderizarCliente(datos) {
  document.getElementById('avatarEl').textContent    = getInitials(datos.nombre);
  document.getElementById('clienteNombre').textContent = datos.nombre  || '—';
  document.getElementById('clienteMeta').textContent   = 'CIF: ' + (datos.cif || '—');
  document.getElementById('topbar-cliente').textContent = (datos.nombre || '') + ' · CIF ' + (datos.cif || '');
  document.getElementById('observaciones').value = '';
  document.getElementById('changesBadge').classList.remove('visible');
  document.getElementById('summaryPanel').classList.remove('visible');

  const container = document.getElementById('seccionesContainer');
  container.innerHTML = '';

  Object.entries(SECCIONES).forEach(([key, meta]) => {
    const campos = datos[key];
    if (!campos || !campos.length) return;

    const sec = document.createElement('div');
    sec.className = 'section';

    if (meta.editable) {
      sec.innerHTML = `
        <div class="section-header editable">✎ ${meta.label}</div>
        <div class="section-note">✏ Complete solo las celdas que requieran corrección. Deje en blanco si el dato es correcto.</div>
        <table class="field-table">
          <thead><tr>
            <th>Campo</th>
            <th>Dato registrado</th>
            <th class="correction">✎ Corrección (si aplica)</th>
          </tr></thead>
          <tbody>
            ${campos.map(c => `
              <tr>
                <td class="field-label-cell">${c.etiqueta}</td>
                <td class="field-value-cell">${c.valor || '<span style="color:#bbb">—</span>'}</td>
                <td class="field-input-cell" id="cell-${key}-${c.campo}">
                  <input class="correction-input"
                    id="inp-${key}-${c.campo}"
                    data-seccion="${key}"
                    data-campo="${c.campo}"
                    data-etiqueta="${c.etiqueta}"
                    data-valor-actual="${c.valor || ''}"
                    placeholder="Nuevo valor..."
                    oninput="onCambio(this)">
                </td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    } else {
      sec.innerHTML = `
        <div class="section-header readonly">${meta.label}</div>
        <div class="readonly-grid">
          ${campos.map(c => `
            <div class="readonly-cell">
              <div class="readonly-label">${c.etiqueta}</div>
              <div class="readonly-value">${c.valor || '—'}</div>
            </div>`).join('')}
        </div>`;
    }

    container.appendChild(sec);
  });

  document.getElementById('resultado').classList.add('visible');
}

function onCambio(input) {
  const { seccion, campo, etiqueta, valorActual } = input.dataset;
  const val = input.value.trim();
  const cell = document.getElementById(`cell-${seccion}-${campo}`);

  if (val) {
    input.classList.add('has-value');
    cell.classList.add('changed');
    cambios[`${seccion}.${campo}`] = { seccion, campo, etiqueta, valorActual, valorNuevo: val };
  } else {
    input.classList.remove('has-value');
    cell.classList.remove('changed');
    delete cambios[`${seccion}.${campo}`];
  }

  actualizarBadge();
  actualizarResumen();
}

function actualizarBadge() {
  const n = Object.keys(cambios).length;
  const badge = document.getElementById('changesBadge');
  if (n > 0) {
    badge.textContent = n + (n === 1 ? ' cambio' : ' cambios');
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

function actualizarResumen() {
  const panel = document.getElementById('summaryPanel');
  const table = document.getElementById('summaryTable');
  const lista = Object.values(cambios);

  if (!lista.length) { panel.classList.remove('visible'); return; }

  panel.classList.add('visible');
  table.innerHTML =
    '<tr style="background:#f7f9fb">' +
      '<td class="lbl" style="font-weight:bold">Campo</td>' +
      '<td class="old" style="font-weight:bold">Valor actual</td>' +
      '<td class="new" style="font-weight:bold">Nuevo valor</td>' +
      '<td class="sec" style="font-weight:bold">Sección</td>' +
    '</tr>' +
    lista.map(c =>
      `<tr>
        <td class="lbl">${c.etiqueta}</td>
        <td class="old">${c.valorActual || '—'}</td>
        <td class="new">${c.valorNuevo}</td>
        <td class="sec">${SECCIONES[c.seccion]?.label || c.seccion}</td>
      </tr>`
    ).join('');
}

function limpiarCambios() {
  cambios = {};
  document.querySelectorAll('.correction-input').forEach(i => {
    i.value = '';
    i.classList.remove('has-value');
  });
  document.querySelectorAll('.field-input-cell').forEach(c => c.classList.remove('changed'));
  document.getElementById('observaciones').value = '';
  actualizarBadge();
  actualizarResumen();
}

async function testEndpoint() {
  const url = document.getElementById('endpointUrl').value.trim();
  if (!url) { showStatus('error', 'Ingrese una URL primero'); return; }
  showStatus('loading', 'Probando conexión...', true);
  try {
    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ test: true }) });
    showStatus('success', `Conexión OK — status ${res.status}`);
  } catch(e) {
    showStatus('error', 'No se pudo alcanzar el endpoint: ' + e.message);
  }
}

function exportarPDF() {
  if (!datosCliente) return;

  const obs   = document.getElementById('observaciones').value.trim();
  const lista = Object.values(cambios);
  const hoy   = new Date().toLocaleDateString('es-PA', { day:'2-digit', month:'2-digit', year:'numeric' });

  const tablaResumen = lista.length
    ? `<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:6px;">
        <thead>
          <tr style="background:#E31E24;color:#fff;">
            <th style="padding:7px 10px;border:1px solid #d9e2ec;text-align:left;">Campo</th>
            <th style="padding:7px 10px;border:1px solid #d9e2ec;text-align:left;">Valor actual</th>
            <th style="padding:7px 10px;border:1px solid #d9e2ec;text-align:left;">Nuevo valor</th>
            <th style="padding:7px 10px;border:1px solid #d9e2ec;text-align:left;">Sección</th>
          </tr>
        </thead>
        <tbody>
          ${lista.map(c => `
            <tr>
              <td style="padding:7px 10px;border:1px solid #e5eaf0;">${c.etiqueta}</td>
              <td style="padding:7px 10px;border:1px solid #e5eaf0;color:#888;text-decoration:line-through;">${c.valorActual || '—'}</td>
              <td style="padding:7px 10px;border:1px solid #e5eaf0;color:#E31E24;font-weight:bold;">${c.valorNuevo}</td>
              <td style="padding:7px 10px;border:1px solid #e5eaf0;color:#185FA5;font-size:11px;">${SECCIONES[c.seccion]?.label || c.seccion}</td>
            </tr>`).join('')}
        </tbody>
      </table>`
    : `<p style="font-size:13px;color:#6b7785;padding:10px 0;">Sin correcciones registradas — datos confirmados como correctos.</p>`;

  const seccionesHtml = Object.entries(SECCIONES).map(([key, meta]) => {
    const campos = datosCliente[key];
    if (!campos || !campos.length) return '';
    if (!meta.editable) {
      return `<div style="font-size:13px;font-weight:bold;color:#fff;background:#4a6278;padding:8px 12px;margin:14px 0 0 0;">${meta.label}</div>
        <table style="width:100%;border-collapse:collapse;font-size:12px;">
          <tbody>${campos.map(c => `
            <tr>
              <td style="width:35%;padding:7px 10px;border:1px solid #e5eaf0;color:#6b7785;font-weight:bold;font-size:11px;text-transform:uppercase;background:#f7f9fb;">${c.etiqueta}</td>
              <td style="padding:7px 10px;border:1px solid #e5eaf0;color:#243746;">${c.valor || '—'}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    }
    return `<div style="font-size:13px;font-weight:bold;color:#fff;background:#E31E24;padding:8px 12px;margin:14px 0 0 0;">${meta.label}</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead>
          <tr>
            <th style="width:28%;padding:7px 10px;border:1px solid #e5eaf0;font-size:10px;color:#6b7785;background:#f0f3f6;text-align:left;">Campo</th>
            <th style="width:36%;padding:7px 10px;border:1px solid #e5eaf0;font-size:10px;color:#6b7785;background:#f0f3f6;text-align:left;">Dato registrado</th>
            <th style="width:36%;padding:7px 10px;border:1px solid #e5eaf0;font-size:10px;color:#E31E24;background:#fff8f8;text-align:left;">✎ Corrección</th>
          </tr>
        </thead>
        <tbody>${campos.map(c => {
          const k = `${key}.${c.campo}`;
          const corr = cambios[k];
          return `<tr>
            <td style="padding:7px 10px;border:1px solid #e5eaf0;color:#6b7785;font-size:11px;">${c.etiqueta}</td>
            <td style="padding:7px 10px;border:1px solid #e5eaf0;color:#243746;">${c.valor || '—'}</td>
            <td style="padding:7px 10px;border:1px solid #e5eaf0;background:${corr ? '#fff8f8' : '#fffbf5'};color:${corr ? '#E31E24' : '#888'};font-weight:${corr ? 'bold' : 'normal'};">${corr ? corr.valorNuevo : '&nbsp;'}</td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>`;
  }).join('');

  const pdfHtml = `
    <div style="max-width:900px;font-family:Arial,Helvetica,sans-serif;color:#243746;background:#fff;">
      <div style="padding:16px 20px;border-bottom:4px solid #E31E24;display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-size:18px;font-weight:bold;">Formulario de actualización de datos</div>
          <div style="font-size:12px;color:#6b7785;margin-top:4px;"><strong>Cliente:</strong> ${datosCliente.nombre} &nbsp;|&nbsp; <strong>CIF:</strong> ${datosCliente.cif}</div>
          <div style="font-size:12px;color:#6b7785;margin-top:2px;"><strong>Fecha de gestión:</strong> ${hoy}</div>
        </div>
      </div>
      <div style="padding:16px 20px;">
        ${seccionesHtml}
        <div style="font-size:13px;font-weight:bold;color:#fff;background:#27500A;padding:8px 12px;margin:18px 0 0 0;">Resumen de correcciones</div>
        ${tablaResumen}
        ${obs ? `<div style="font-size:13px;font-weight:bold;color:#fff;background:#4a6278;padding:8px 12px;margin:14px 0 0 0;">Observaciones del oficial</div>
          <div style="padding:10px 12px;border:1px solid #e5eaf0;font-size:13px;color:#243746;line-height:1.6;">${obs}</div>` : ''}
        <div style="margin-top:20px;padding:10px 12px;background:#f8fafc;border:1px solid #e5eaf0;font-size:11px;color:#6b7785;line-height:1.7;">
          <strong>Documento de uso interno.</strong> Generado el ${hoy}. Versión 1.0.
        </div>
      </div>
    </div>`;

  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;left:-9999px;top:0;width:900px;background:#fff;padding:0;margin:0;';
  el.innerHTML = pdfHtml;
  document.body.appendChild(el);

  const opt = {
    margin:      [10, 10, 10, 10],
    filename:    `validacion_${datosCliente.cif}_${hoy.replace(/\//g,'-')}.pdf`,
    image:       { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false, allowTaint: true },
    jsPDF:       { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  html2pdf().set(opt).from(el).save().then(() => {
    document.body.removeChild(el);
    showStatus('success', 'PDF exportado correctamente');
  }).catch(err => {
    document.body.removeChild(el);
    showStatus('error', 'Error generando PDF: ' + err.message);
  });
}

loadConfig();
</script>
</body>
</html>
